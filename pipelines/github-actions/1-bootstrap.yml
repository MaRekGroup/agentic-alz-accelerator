# ============================================================================
# Bootstrap — One-Time Azure Landing Zone Foundation Setup
# Run ONCE before any deployment. Creates management group hierarchy,
# moves subscriptions, registers resource providers, and verifies OIDC.
# ============================================================================
name: "1 · Bootstrap Landing Zone Foundation"

on:
  workflow_dispatch:
    inputs:
      mg_prefix:
        description: 'Management group prefix (e.g., mrg)'
        required: true
        default: 'mrg'
      primary_location:
        description: 'Primary Azure region'
        required: true
        default: 'southcentralus'
        type: choice
        options:
          - southcentralus
          - eastus2
          - eastus
          - westus2
          - westus3
          - centralus
          - northeurope
          - westeurope
      action:
        description: 'What to set up'
        required: true
        type: choice
        options:
          - all                     # Full bootstrap (MG + subs + providers)
          - management-groups-only  # Just create MG hierarchy
          - move-subscriptions-only # Just move subs to MGs
          - register-providers-only # Just register resource providers
          - verify-only             # Verify everything is in place
          - delete-old-prefix       # Delete old MG hierarchy (requires old_prefix)
      old_prefix:
        description: 'Old MG prefix to delete (only used with delete-old-prefix action)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

env:
  PREFIX: ${{ inputs.mg_prefix }}

jobs:
  # =========================================================================
  # Verify OIDC and Azure access
  # =========================================================================
  verify-access:
    name: Verify Azure Access
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    outputs:
      tenant_id: ${{ steps.login.outputs.tenant_id }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        id: login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_MGMT_SUBSCRIPTION_ID }}

      - name: Verify tenant access
        run: |
          echo "=== Tenant Info ==="
          az account show --query "{TenantId:tenantId, User:user.name}" -o table

          echo ""
          echo "=== Available Subscriptions ==="
          az account list --query "[].{Name:name, Id:id, State:state}" -o table

          echo ""
          echo "=== Management Group Access ==="
          az account management-group list --query "[].{Name:name, DisplayName:displayName}" -o table 2>/dev/null || echo "No management groups found (will create)"

      - name: Verify subscription count
        run: |
          SUB_COUNT=$(az account list --query "length([?state=='Enabled'])" -o tsv)
          echo "Active subscriptions: $SUB_COUNT"
          if [ "$SUB_COUNT" -lt 10 ]; then
            echo "WARNING: Found $SUB_COUNT active subscriptions. Expected 10."
            echo "Ensure all 10 subscriptions are accessible to this service principal."
          fi

  # =========================================================================
  # Create management group hierarchy
  # =========================================================================
  create-management-groups:
    name: Create Management Group Hierarchy
    needs: verify-access
    if: inputs.action == 'all' || inputs.action == 'management-groups-only'
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_MGMT_SUBSCRIPTION_ID }}

      - name: Create CAF management group hierarchy
        run: |
          set -euo pipefail
          PREFIX="${{ env.PREFIX }}"

          echo "============================================"
          echo "Creating CAF Enterprise-Scale MG Hierarchy"
          echo "Prefix: $PREFIX"
          echo "============================================"

          # Helper function
          create_mg() {
            local name="$1" parent="$2" display="$3"
            echo "Creating: $display ($name) under $parent"
            az account management-group create \
              --name "$name" \
              --parent "$parent" \
              --display-name "$display" \
              --output none 2>/dev/null || echo "  (already exists)"
          }

          # ── Root ──
          echo ""
          echo "── Root ──"
          az account management-group create \
            --name "$PREFIX" \
            --display-name "Azure Landing Zones" \
            --output none 2>/dev/null || echo "Root MG already exists"

          # ── Platform ──
          echo ""
          echo "── Platform Landing Zones ──"
          create_mg "${PREFIX}-platform"              "$PREFIX"            "Platform"
          create_mg "${PREFIX}-platform-management"   "${PREFIX}-platform" "Management"
          create_mg "${PREFIX}-platform-connectivity"  "${PREFIX}-platform" "Connectivity"
          create_mg "${PREFIX}-platform-identity"     "${PREFIX}-platform" "Identity"
          create_mg "${PREFIX}-platform-security"     "${PREFIX}-platform" "Security"

          # ── Landing Zones ──
          echo ""
          echo "── Application Landing Zones ──"
          create_mg "${PREFIX}-landingzones"          "$PREFIX"                   "Landing Zones"
          create_mg "${PREFIX}-landingzones-corp"     "${PREFIX}-landingzones"    "Corp"
          create_mg "${PREFIX}-landingzones-online"   "${PREFIX}-landingzones"    "Online"
          create_mg "${PREFIX}-landingzones-sap"      "${PREFIX}-landingzones"    "SAP"

          # ── Sandbox & Decommissioned ──
          echo ""
          echo "── Sandbox & Decommissioned ──"
          create_mg "${PREFIX}-sandbox"               "$PREFIX" "Sandbox"
          create_mg "${PREFIX}-decommissioned"        "$PREFIX" "Decommissioned"

          echo ""
          echo "=== Management Group Hierarchy ==="
          az account management-group list \
            --query "[?starts_with(name, '$PREFIX')].{Name:name, DisplayName:displayName, Parent:details.parent.displayName}" \
            -o table

  # =========================================================================
  # Move subscriptions into management groups
  # =========================================================================
  move-subscriptions:
    name: Move Subscriptions to Management Groups
    needs: create-management-groups
    if: |
      always() &&
      (inputs.action == 'all' || inputs.action == 'move-subscriptions-only') &&
      (needs.create-management-groups.result == 'success' || needs.create-management-groups.result == 'skipped')
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_MGMT_SUBSCRIPTION_ID }}

      - name: Move subscriptions to management groups
        run: |
          set -euo pipefail
          PREFIX="${{ env.PREFIX }}"

          move_sub() {
            local mg="$1" sub_id="$2" label="$3"
            if [ -z "$sub_id" ] || [ "$sub_id" = "skip" ]; then
              echo "SKIP: $label (no subscription ID configured)"
              return
            fi
            echo "Moving $label → $mg"
            az account management-group subscription add \
              --name "$mg" --subscription "$sub_id" \
              --output none 2>/dev/null && echo "  Done" || echo "  (may already be in place)"
          }

          echo "=== Platform Subscriptions ==="
          move_sub "${PREFIX}-platform-management"    "${{ secrets.PLATFORM_MGMT_SUBSCRIPTION_ID }}"  "Management (Sub 1)"
          move_sub "${PREFIX}-platform-connectivity"   "${{ secrets.PLATFORM_CONN_SUBSCRIPTION_ID }}"  "Connectivity (Sub 2)"
          move_sub "${PREFIX}-platform-identity"      "${{ secrets.PLATFORM_IDTY_SUBSCRIPTION_ID }}"  "Identity (Sub 3)"
          move_sub "${PREFIX}-platform-security"      "${{ secrets.PLATFORM_SEC_SUBSCRIPTION_ID }}"   "Security (Sub 4)"

          echo ""
          echo "=== Application Subscriptions (from subscriptions.json) ==="
          CONFIG="environments/subscriptions.json"
          ALL_SECRETS='${{ toJson(secrets) }}'

          # Read app LZs dynamically from config
          jq -r '.application | to_entries[] | select(.key | startswith("_") | not) | "\(.value.management_group) \(.value.github_secret) \(.value.display_name)"' "$CONFIG" | \
          while IFS=' ' read -r mg secret_name display_rest; do
            # Reconstruct display name (may contain spaces)
            display_name=$(jq -r --arg k "$(echo "$mg" | head -1)" '.application | to_entries[] | select(.value.management_group == $k) | .value.display_name' "$CONFIG" 2>/dev/null | head -1)
            SUB_ID=$(echo "$ALL_SECRETS" | jq -r --arg k "$secret_name" '.[$k] // "skip"')
            move_sub "${PREFIX}-${mg}" "$SUB_ID" "$display_rest"
          done

          echo ""
          echo "=== Verification ==="
          # Platform MGs
          for mg in platform-management platform-connectivity platform-identity platform-security; do
            echo "── ${PREFIX}-${mg} ──"
            az account management-group subscription show \
              --name "${PREFIX}-${mg}" \
              --query "[].{Name:displayName, Id:id}" -o table 2>/dev/null || echo "  (empty)"
          done
          # App MGs (read unique management_groups from config)
          jq -r '.application | [to_entries[] | select(.key | startswith("_") | not) | .value.management_group] | unique[]' "$CONFIG" | \
          while read -r mg; do
            echo "── ${PREFIX}-${mg} ──"
            az account management-group subscription show \
              --name "${PREFIX}-${mg}" \
              --query "[].{Name:displayName, Id:id}" -o table 2>/dev/null || echo "  (empty)"
          done

  # =========================================================================
  # Register resource providers across all subscriptions
  # =========================================================================
  register-providers:
    name: Register Resource Providers
    needs: move-subscriptions
    if: |
      always() &&
      (inputs.action == 'all' || inputs.action == 'register-providers-only') &&
      (needs.move-subscriptions.result == 'success' || needs.move-subscriptions.result == 'skipped')
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_MGMT_SUBSCRIPTION_ID }}

      - name: Register providers on all subscriptions
        run: |
          set -euo pipefail

          # Required providers for ALZ
          PROVIDERS=(
            "Microsoft.OperationalInsights"
            "Microsoft.SecurityInsights"
            "Microsoft.Security"
            "Microsoft.Network"
            "Microsoft.Compute"
            "Microsoft.Storage"
            "Microsoft.KeyVault"
            "Microsoft.Authorization"
            "Microsoft.PolicyInsights"
            "Microsoft.Automation"
            "Microsoft.RecoveryServices"
            "Microsoft.ManagedIdentity"
            "Microsoft.Logic"
            "Microsoft.AlertsManagement"
            "Microsoft.Insights"
            "Microsoft.GuestConfiguration"
            "Microsoft.Maintenance"
            "Microsoft.OperationsManagement"
            "Microsoft.Advisor"
            "Microsoft.CostManagement"
          )

          # Platform subscription IDs (fixed)
          SUBS=(
            "${{ secrets.PLATFORM_MGMT_SUBSCRIPTION_ID }}"
            "${{ secrets.PLATFORM_CONN_SUBSCRIPTION_ID }}"
            "${{ secrets.PLATFORM_IDTY_SUBSCRIPTION_ID }}"
            "${{ secrets.PLATFORM_SEC_SUBSCRIPTION_ID }}"
          )

          # App subscription IDs (read dynamically from config)
          CONFIG="environments/subscriptions.json"
          ALL_SECRETS='${{ toJson(secrets) }}'
          while read -r secret_name; do
            SUB_ID=$(echo "$ALL_SECRETS" | jq -r --arg k "$secret_name" '.[$k] // empty')
            [ -n "$SUB_ID" ] && SUBS+=("$SUB_ID")
          done < <(jq -r '.application | to_entries[] | select(.key | startswith("_") | not) | .value.github_secret' "$CONFIG")

          for sub in "${SUBS[@]}"; do
            if [ -z "$sub" ]; then continue; fi
            echo "=== Subscription: $sub ==="
            for provider in "${PROVIDERS[@]}"; do
              state=$(az provider show --namespace "$provider" --subscription "$sub" \
                --query "registrationState" -o tsv 2>/dev/null)
              if [ "$state" != "Registered" ]; then
                echo "  Registering $provider..."
                az provider register --namespace "$provider" --subscription "$sub" \
                  --output none --wait 2>/dev/null &
              fi
            done
            wait
            echo "  Done"
          done

          echo ""
          echo "Provider registration initiated. Some may take 5-10 minutes to complete."

  # =========================================================================
  # Delete old MG hierarchy (for prefix migration)
  # =========================================================================
  delete-old-prefix:
    name: Delete Old MG Hierarchy
    needs: [verify-access]
    if: inputs.action == 'delete-old-prefix' && inputs.old_prefix != ''
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_MGMT_SUBSCRIPTION_ID }}

      - name: Delete old management groups (bottom-up)
        run: |
          set -euo pipefail
          OLD="${{ inputs.old_prefix }}"

          echo "============================================"
          echo "  Deleting old MG hierarchy: ${OLD}-*"
          echo "============================================"

          # Safety: verify no subscriptions remain under old MGs
          echo ""
          echo "── Pre-flight: checking for remaining subscriptions ──"
          REMAINING=$(az account management-group show \
            --name "$OLD" --expand --recurse \
            --query "length([].children[?type=='Microsoft.Management/managementGroups/subscriptions'][])" \
            -o tsv 2>/dev/null || echo "0")

          if [ "$REMAINING" != "0" ] && [ "$REMAINING" != "" ]; then
            echo "ERROR: $REMAINING subscription(s) still under ${OLD}-* MGs. Move them first."
            exit 1
          fi
          echo "  No subscriptions found — safe to delete."

          delete_mg() {
            local name="$1"
            echo "  Deleting: $name"
            az account management-group delete --name "$name" --output none 2>/dev/null && echo "    ✅ Deleted" || echo "    ⚠️  Not found or already deleted"
          }

          # Delete bottom-up: leaves → parents → root
          echo ""
          echo "── Leaf MGs (platform children) ──"
          for mg in "${OLD}-platform-management" "${OLD}-platform-connectivity" "${OLD}-platform-identity" "${OLD}-platform-security"; do
            delete_mg "$mg"
          done

          echo ""
          echo "── Leaf MGs (landing zone children) ──"
          for mg in "${OLD}-landingzones-corp" "${OLD}-landingzones-online" "${OLD}-landingzones-sap"; do
            delete_mg "$mg"
          done

          echo ""
          echo "── Parent MGs ──"
          for mg in "${OLD}-platform" "${OLD}-landingzones" "${OLD}-sandbox" "${OLD}-decommissioned"; do
            delete_mg "$mg"
          done

          echo ""
          echo "── Root MG ──"
          delete_mg "$OLD"

          echo ""
          echo "Old MG hierarchy deletion complete."

  # =========================================================================
  # Final verification
  # =========================================================================
  verify:
    name: Verify Bootstrap
    needs: [verify-access, create-management-groups, move-subscriptions, register-providers, delete-old-prefix]
    if: always()
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_MGMT_SUBSCRIPTION_ID }}

      - name: Generate bootstrap report
        run: |
          PREFIX="${{ env.PREFIX }}"

          echo "========================================"
          echo "  ALZ Bootstrap Verification Report"
          echo "========================================"

          echo ""
          echo "1. Management Group Hierarchy"
          echo "────────────────────────────"
          az account management-group list \
            --query "[?starts_with(name, '$PREFIX')]" \
            -o table

          echo ""
          echo "2. Subscription Placement"
          echo "────────────────────────"
          az account management-group show \
            --name "$PREFIX" --expand --recurse \
            --query "children[].{MG:displayName, Subs:children[?type=='Microsoft.Management/managementGroups/subscriptions'].displayName}" \
            -o json 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for mg in data:
              subs = mg.get('Subs', [])
              if subs:
                  for s in subs:
                      print(f'  {mg[\"MG\"]:30s} ← {s}')
              else:
                  print(f'  {mg[\"MG\"]:30s}   (checking children...)')
          " || echo "  (verify manually)"

          echo ""
          echo "3. Key Resource Providers"
          echo "────────────────────────"
          az provider show --namespace Microsoft.SecurityInsights \
            --subscription "${{ secrets.PLATFORM_SEC_SUBSCRIPTION_ID }}" \
            --query "{Provider:namespace, State:registrationState}" -o table 2>/dev/null

          az provider show --namespace Microsoft.Security \
            --subscription "${{ secrets.PLATFORM_SEC_SUBSCRIPTION_ID }}" \
            --query "{Provider:namespace, State:registrationState}" -o table 2>/dev/null

          echo ""
          echo "Bootstrap verification complete."
          echo "Next step: Run '2 · Deploy Platform Landing Zones'"
