name: "2 - Deploy Platform Landing Zones"

on:
  workflow_dispatch:
    inputs:
      platform_subscription:
        description: "Platform subscription to deploy"
        required: true
        type: choice
        options:
          - management
          - connectivity
          - identity
          - security
      framework:
        description: "IaC Framework"
        required: true
        type: choice
        options:
          - bicep
          - terraform
      environment:
        description: "Target Environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Deployment Action"
        required: true
        type: choice
        options:
          - plan
          - deploy
      location:
        description: "Azure region for deployment"
        required: false
        type: string
        default: "southcentralus"

permissions:
  id-token: write
  contents: read

jobs:
  # =========================================================================
  # Pre-flight: Security Baseline & Cost Governance Validation
  # =========================================================================
  preflight:
    name: Pre-flight Checks
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Security Baseline Validation
        run: |
          python scripts/validators/validate_security_baseline.py \
            --module "infra/${{ inputs.framework }}/modules/${{ inputs.platform_subscription == 'management' && 'management' || inputs.platform_subscription == 'connectivity' && 'connectivity' || inputs.platform_subscription == 'identity' && 'identity' || 'platform-security' }}"

      - name: Cost Governance Validation
        run: |
          python scripts/validators/validate_cost_governance.py \
            --module "infra/${{ inputs.framework }}/modules/${{ inputs.platform_subscription == 'management' && 'management' || inputs.platform_subscription == 'connectivity' && 'connectivity' || inputs.platform_subscription == 'identity' && 'identity' || 'platform-security' }}"

  # =========================================================================
  # Deploy Platform Subscription (Bicep)
  # =========================================================================
  deploy-bicep:
    name: "Deploy ${{ inputs.platform_subscription }} (Bicep)"
    needs: preflight
    if: inputs.framework == 'bicep'
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: platform-${{ inputs.platform_subscription }}
    env:
      SUBSCRIPTION_SECRET: ${{ inputs.platform_subscription == 'management' && 'PLATFORM_MANAGEMENT_SUBSCRIPTION_ID' || inputs.platform_subscription == 'connectivity' && 'PLATFORM_CONNECTIVITY_SUBSCRIPTION_ID' || inputs.platform_subscription == 'identity' && 'PLATFORM_IDENTITY_SUBSCRIPTION_ID' || 'PLATFORM_SECURITY_SUBSCRIPTION_ID' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets[env.SUBSCRIPTION_SECRET] }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: Set Subscription Context
        run: az account set --subscription "${{ secrets[env.SUBSCRIPTION_SECRET] }}"

      - name: Bicep What-If
        if: inputs.action == 'plan'
        run: |
          MODULE_PATH="infra/bicep/modules"
          case "${{ inputs.platform_subscription }}" in
            management)   TEMPLATE="$MODULE_PATH/management/main.bicep" ;;
            connectivity) TEMPLATE="$MODULE_PATH/connectivity/main.bicep" ;;
            identity)     TEMPLATE="$MODULE_PATH/identity/main.bicep" ;;
            security)     TEMPLATE="$MODULE_PATH/platform-security/main.bicep" ;;
          esac

          az deployment sub what-if \
            --location ${{ inputs.location }} \
            --template-file "$TEMPLATE" \
            --parameters @infra/bicep/parameters/platform-${{ inputs.platform_subscription }}-${{ inputs.environment }}.bicepparam

      - name: Bicep Deploy
        if: inputs.action == 'deploy'
        run: |
          MODULE_PATH="infra/bicep/modules"
          case "${{ inputs.platform_subscription }}" in
            management)   TEMPLATE="$MODULE_PATH/management/main.bicep" ;;
            connectivity) TEMPLATE="$MODULE_PATH/connectivity/main.bicep" ;;
            identity)     TEMPLATE="$MODULE_PATH/identity/main.bicep" ;;
            security)     TEMPLATE="$MODULE_PATH/platform-security/main.bicep" ;;
          esac

          az deployment sub create \
            --location ${{ inputs.location }} \
            --template-file "$TEMPLATE" \
            --parameters @infra/bicep/parameters/platform-${{ inputs.platform_subscription }}-${{ inputs.environment }}.bicepparam \
            --name "platform-${{ inputs.platform_subscription }}-$(date +%Y%m%d%H%M%S)"

  # =========================================================================
  # Deploy Platform Subscription (Terraform)
  # =========================================================================
  deploy-terraform:
    name: "Deploy ${{ inputs.platform_subscription }} (Terraform)"
    needs: preflight
    if: inputs.framework == 'terraform'
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: platform-${{ inputs.platform_subscription }}
    env:
      SUBSCRIPTION_SECRET: ${{ inputs.platform_subscription == 'management' && 'PLATFORM_MANAGEMENT_SUBSCRIPTION_ID' || inputs.platform_subscription == 'connectivity' && 'PLATFORM_CONNECTIVITY_SUBSCRIPTION_ID' || inputs.platform_subscription == 'identity' && 'PLATFORM_IDENTITY_SUBSCRIPTION_ID' || 'PLATFORM_SECURITY_SUBSCRIPTION_ID' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets[env.SUBSCRIPTION_SECRET] }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: infra/terraform/modules/${{ inputs.platform_subscription == 'management' && 'platform-management' || inputs.platform_subscription == 'security' && 'platform-security' || inputs.platform_subscription }}
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=platform-${{ inputs.platform_subscription }}-${{ inputs.environment }}.terraform.tfstate"
        env:
          ARM_USE_OIDC: true
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets[env.SUBSCRIPTION_SECRET] }}

      - name: Terraform Plan
        working-directory: infra/terraform/modules/${{ inputs.platform_subscription == 'management' && 'platform-management' || inputs.platform_subscription == 'security' && 'platform-security' || inputs.platform_subscription }}
        run: terraform plan -out=tfplan
        env:
          ARM_USE_OIDC: true
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets[env.SUBSCRIPTION_SECRET] }}

      - name: Terraform Apply
        if: inputs.action == 'deploy'
        working-directory: infra/terraform/modules/${{ inputs.platform_subscription == 'management' && 'platform-management' || inputs.platform_subscription == 'security' && 'platform-security' || inputs.platform_subscription }}
        run: terraform apply -auto-approve tfplan
        env:
          ARM_USE_OIDC: true
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets[env.SUBSCRIPTION_SECRET] }}

  # =========================================================================
  # Post-Deployment Validation
  # =========================================================================
  validate:
    name: Post-Deployment Validation
    needs: [deploy-bicep, deploy-terraform]
    if: |
      always() && inputs.action == 'deploy' &&
      (needs.deploy-bicep.result == 'success' || needs.deploy-terraform.result == 'success')
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Validate Landing Zone Resources
        run: |
          python -c "
          import asyncio, json
          from src.tools.resource_graph import ResourceGraphClient

          async def main():
              client = ResourceGraphClient()
              result = await client.validate_landing_zone('${{ secrets[env.SUBSCRIPTION_SECRET] }}')
              print(json.dumps(result, indent=2))
              assert result.get('validation_passed', False), 'Landing zone validation failed'

          asyncio.run(main())
          "
