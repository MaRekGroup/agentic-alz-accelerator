  - id: APRL-OPE-9729C89D
    title: Configure Service Health Alerts (Subscriptions)
    pillar: operational_excellence
    caf_area: management
    alz_area: logging
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: "resourcecontainers\n| where type == 'microsoft.resources/subscriptions'\n| project subscriptionId = id, subscriptionName\
      \ = name, tags\n| join kind=leftouter (\n    resources\n    | where type == \"microsoft.insights/activitylogalerts\"\
      \ and properties.condition contains \"ServiceHealth\"\n    | extend shaRuleType = iff(array_length(properties.condition.allOf)\
      \ > 1, 'Explicit','All')\n    | project subscriptionId = strcat('/subscriptions/',subscriptionId), name, shaRuleType\n\
      \    | summarize shaAllRuleCount = countif(shaRuleType == 'All'), shaExplicitRuleCount = countif(shaRuleType == 'Explicit')\
      \ by subscriptionId\n) on subscriptionId\n| extend shaStatus = iff(isnull(shaAllRuleCount) and isnull(shaExplicitRuleCount),\
      \ 'Not configured',iff(shaAllRuleCount >= 1, 'Configured', 'Explicit'))\n| where shaStatus != 'Configured'\n| project\
      \ recommendationId = \"9729c89d-8118-41b4-a39b-e12468fa872b\", name = subscriptionName, id= subscriptionId, tags, param1\
      \ = iff(shaStatus == 'Explicit', 'Explicit only Service Health Alert Rule(s) found. Please verify that the expected\
      \ scope is covered by these rule(s).','No Service Health Alert Rule found.')"
    match: any
    recommendation: Service health gives a personalized health view of Azure services and regions used, offering the best
      place for notifications on outages, planned maintenance, and health advisories by knowing the services used.
    references:
      - https://learn.microsoft.com/azure/service-health/alerts-activity-log-service-notifications-portal
    mappings:
      waf_pillar:
        - operational_excellence
      caf_lifecycle:
        - govern
        - manage
      aprl_guid: 9729c89d-8118-41b4-a39b-e12468fa872b
      resource_type: Microsoft.Subscription/Subscriptions
