  - id: OPE-007
    title: "Virtual machines without diagnostic settings"
    pillar: operational_excellence
    caf_area: management
    alz_area: logging
    severity: medium
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ 'microsoft.compute/virtualmachines'
      | extend resourceId = tolower(id)
      | project id, name, resourceGroup, subscriptionId, resourceId
      | join kind=leftouter (
          resources
          | where type =~ 'microsoft.insights/diagnosticsettings'
          | extend targetId = tolower(tostring(properties.resourceId))
          | project targetId
        ) on $left.resourceId == $right.targetId
      | where isempty(targetId)
      | project id, name, resourceGroup, subscriptionId
    match: any
    recommendation: "Configure diagnostic settings on virtual machines to stream guest and platform telemetry to a monitoring destination."
    remediation_steps:
      - "Create VM diagnostic settings: az monitor diagnostic-settings create --resource {vm-id} --workspace {law-id}"
    references:
      - "https://learn.microsoft.com/azure/azure-monitor/essentials/diagnostic-settings"
    mappings:
      waf_pillar: [operational_excellence]
      caf_lifecycle: [govern, manage]
      resource_type: Microsoft.Compute/virtualMachines

