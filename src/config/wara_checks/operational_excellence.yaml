  - id: OPE-009
    title: "AKS clusters without Container Insights"
    pillar: operational_excellence
    caf_area: management
    alz_area: logging
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ 'microsoft.containerservice/managedclusters'
      | extend containerInsightsEnabled = tostring(properties.addonProfiles.omsagent.enabled)
      | where isempty(containerInsightsEnabled) or containerInsightsEnabled !~ 'true'
      | project id, name, resourceGroup, subscriptionId,
                containerInsightsEnabled = iff(isempty(containerInsightsEnabled), 'false', containerInsightsEnabled)
    match: any
    recommendation: "Enable Container Insights on AKS clusters to capture control plane, node, and container telemetry."
    remediation_steps:
      - "Enable monitoring: az aks enable-addons --addons monitoring --name {aks-name} --resource-group {rg}"
    references:
      - "https://learn.microsoft.com/azure/azure-monitor/containers/container-insights-enable-aks"
    mappings:
      waf_pillar: [operational_excellence]
      caf_lifecycle: [govern, manage]
      resource_type: Microsoft.ContainerService/managedClusters

  - id: OPE-010
    title: "SQL servers without auditing enabled"
    pillar: operational_excellence
    caf_area: management
    alz_area: logging
    severity: high
    confidence: medium
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ 'microsoft.sql/servers'
      | extend serverId = tolower(id)
      | project id, name, resourceGroup, subscriptionId, serverId
      | join kind=leftouter (
          resources
          | where type =~ 'microsoft.sql/servers/auditingsettings'
          | extend auditingSettingId = tolower(id)
          | extend serverId = substring(auditingSettingId, 0, indexof(auditingSettingId, '/auditingsettings/'))
          | extend auditingState = tostring(properties.state)
          | project serverId, auditingState
        ) on serverId
      | where isempty(auditingState) or auditingState !~ 'Enabled'
      | project id, name, resourceGroup, subscriptionId,
                auditingState = iff(isempty(auditingState), 'NotConfigured', auditingState)
    match: any
    recommendation: "Enable SQL auditing on every Azure SQL logical server to capture security and operational events."
    remediation_steps:
      - "Enable auditing: az sql server audit-policy update --state Enabled --name {server-name} --resource-group {rg}"
    references:
      - "https://learn.microsoft.com/azure/azure-sql/database/auditing-overview"
    mappings:
      waf_pillar: [operational_excellence]
      caf_lifecycle: [govern, manage]
      resource_type: Microsoft.Sql/servers

