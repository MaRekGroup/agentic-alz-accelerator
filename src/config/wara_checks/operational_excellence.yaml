# Operational Excellence Pillar Checks
# Evaluated by src/tools/wara_engine.py
# Prefix: OPE-

checks:
  - id: OPE-001
    title: "Log Analytics workspace retention under 90 days"
    pillar: operational_excellence
    caf_area: management
    alz_area: logging
    severity: medium
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ 'microsoft.operationalinsights/workspaces'
      | where toint(properties.retentionInDays) < 90
      | project id, name, resourceGroup, subscriptionId,
                retentionDays=properties.retentionInDays
    match: any
    recommendation: "Set LAW retention to at least 90 days for compliance."
    remediation_steps:
      - "Update workspace: az monitor log-analytics workspace update --retention-time 90"
    references:
      - "https://learn.microsoft.com/azure/azure-monitor/logs/data-retention-configure"
    mappings:
      waf_pillar: [operational_excellence]
      caf_lifecycle: [manage]

