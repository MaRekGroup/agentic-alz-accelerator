  - id: OPE-015
    title: "Critical infrastructure resources without locks"
    pillar: operational_excellence
    caf_area: governance
    alz_area: policy
    severity: medium
    confidence: medium
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type in~ (
          'microsoft.network/azurefirewalls',
          'microsoft.keyvault/vaults',
          'microsoft.operationalinsights/workspaces',
          'microsoft.network/virtualnetworks'
        )
      | extend protectedResourceId = tolower(id)
      | project id, name, resourceGroup, subscriptionId, type, protectedResourceId
      | join kind=leftouter (
          resources
          | where type =~ 'microsoft.authorization/locks'
          | extend lockId = tolower(id)
          | extend lockScope = tolower(
              iff(
                isnotempty(tostring(properties.scope)),
                tostring(properties.scope),
                substring(lockId, 0, indexof(lockId, '/providers/microsoft.authorization/locks/'))
              )
            )
          | project lockScope, lockLevel = tostring(properties.level)
        ) on $left.protectedResourceId == $right.lockScope
      | where isempty(lockLevel)
      | project id, name, resourceGroup, subscriptionId, resourceType = type
    match: any
    recommendation: "Apply delete or read-only locks to critical shared infrastructure to reduce accidental change risk."
    remediation_steps:
      - "Create locks: az lock create --lock-type CanNotDelete --name {lock-name} --resource {resource-id}"
    references:
      - "https://learn.microsoft.com/azure/azure-resource-manager/management/lock-resources"
    mappings:
      waf_pillar: [operational_excellence]
      caf_lifecycle: [govern, manage]
      resource_type: Microsoft.Authorization/locks

  - id: OPE-016
    title: "Virtual machines without Update Manager assessment mode"
    pillar: operational_excellence
    caf_area: management
    alz_area: logging
    severity: medium
    confidence: medium
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ 'microsoft.compute/virtualmachines'
      | extend windowsAssessmentMode = tostring(properties.osProfile.windowsConfiguration.patchSettings.assessmentMode)
      | extend linuxAssessmentMode = tostring(properties.osProfile.linuxConfiguration.patchSettings.assessmentMode)
      | extend patchAssessmentMode = iff(isempty(windowsAssessmentMode), linuxAssessmentMode, windowsAssessmentMode)
      | where isempty(patchAssessmentMode) or patchAssessmentMode !~ 'AutomaticByPlatform'
      | project id, name, resourceGroup, subscriptionId,
                patchAssessmentMode = iff(isempty(patchAssessmentMode), 'NotConfigured', patchAssessmentMode)
    match: any
    recommendation: "Enable Azure Update Manager-compatible patch assessment on virtual machines for continuous update visibility."
    remediation_steps:
      - "Set assessment mode to AutomaticByPlatform on supported Windows and Linux VMs"
    references:
      - "https://learn.microsoft.com/azure/update-manager/manage-updates-for-vm"
    mappings:
      waf_pillar: [operational_excellence]
      caf_lifecycle: [govern, manage]
      resource_type: Microsoft.Compute/virtualMachines

  - id: OPE-017
    title: "Subscriptions without Defender for Cloud enabled"
    pillar: operational_excellence
    caf_area: security
    alz_area: security
    severity: high
    confidence: medium
    scope: subscription
    query_type: resource_graph
    query: |
      resourcecontainers
      | where type =~ 'microsoft.resources/subscriptions'
      | extend subscriptionResourceId = tolower(id)
      | extend subscriptionId = tostring(split(id, '/')[2])
      | project id, name, resourceGroup = '', subscriptionId, subscriptionResourceId
      | join kind=leftouter (
          securityresources
          | where type =~ 'microsoft.security/pricings'
          | where properties.pricingTier =~ 'Standard'
          | summarize standardPlanCount = count() by subscriptionId
          | extend subscriptionResourceId = tolower(strcat('/subscriptions/', subscriptionId))
          | project subscriptionResourceId, standardPlanCount
        ) on subscriptionResourceId
      | where isnull(standardPlanCount) or standardPlanCount == 0
      | project id, name, resourceGroup, subscriptionId
    match: any
    recommendation: "Enable Defender for Cloud plans on each subscription to provide security posture management and protections."
    remediation_steps:
      - "Enable plans: az security pricing create --name VirtualMachines --tier Standard"
    references:
      - "https://learn.microsoft.com/azure/defender-for-cloud/enable-enhanced-security"
    mappings:
      waf_pillar: [operational_excellence, security]
      caf_lifecycle: [govern, manage]
      resource_type: Microsoft.Security/pricings

