# Reliability Pillar Checks
# Evaluated by src/tools/wara_engine.py
# Prefix: REL-

checks:
  - id: REL-001
    title: "VMs without availability zones"
    pillar: reliability
    caf_area: network
    alz_area: networking
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ 'microsoft.compute/virtualmachines'
      | where isnull(zones) or array_length(zones) == 0
      | project id, name, resourceGroup, subscriptionId, location
    match: any
    recommendation: "Deploy VMs across availability zones for high availability."
    remediation_steps:
      - "Redeploy VMs into availability zones (requires VM recreate)"
    references:
      - "https://learn.microsoft.com/azure/reliability/availability-zones-overview"
    mappings:
      waf_pillar: [reliability]
      caf_lifecycle: [ready, adopt]
      resource_type: "Microsoft.Compute/virtualMachines"

  - id: REL-002
    title: "Single-instance resources without redundancy"
    pillar: reliability
    caf_area: management
    alz_area: logging
    severity: medium
    confidence: medium
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type in~ (
          'microsoft.operationalinsights/workspaces',
          'microsoft.automation/automationaccounts',
          'microsoft.keyvault/vaults'
        )
      | summarize count=count() by type
      | where count == 1
      | project type, count
    match: any
    recommendation: "Consider redundancy for single-instance critical resources."
    remediation_steps:
      - "Evaluate if cross-region replication or secondary instances are needed"
    references:
      - "https://learn.microsoft.com/azure/reliability/overview"
    mappings:
      waf_pillar: [reliability]
      caf_lifecycle: [ready, adopt]
      resource_type: "Microsoft.OperationalInsights/workspaces,Microsoft.Automation/automationAccounts,Microsoft.KeyVault/vaults"

  - id: REL-003
    title: "VMs without backup enabled"
    pillar: reliability
    caf_area: management
    alz_area: logging
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ 'microsoft.compute/virtualmachines'
      | extend vmId = tolower(id)
      | project id, name, resourceGroup, subscriptionId, location, vmId
      | join kind=leftouter (
          recoveryservicesresources
          | where type =~ 'microsoft.recoveryservices/vaults/backupFabrics/protectionContainers/protectedItems'
          | extend protectedResourceId = tolower(coalesce(
              tostring(properties.sourceResourceId),
              tostring(properties.dataSourceInfo.resourceID),
              tostring(properties.dataSourceInfo.datasourceId)
            ))
          | where isnotempty(protectedResourceId)
          | summarize by protectedResourceId
        ) on $left.vmId == $right.protectedResourceId
      | where isempty(protectedResourceId)
      | project id, name, resourceGroup, subscriptionId, location
    match: any
    recommendation: "Enable Azure Backup for production virtual machines to improve recovery readiness."
    remediation_steps:
      - "Create or select a Recovery Services vault in the target region"
      - "Configure backup protection for each VM and validate restore points are created"
    references:
      - "https://learn.microsoft.com/azure/backup/backup-overview"
    mappings:
      waf_pillar: [reliability]
      caf_lifecycle: [ready, adopt]
      resource_type: "Microsoft.Compute/virtualMachines"

  - id: REL-004
    title: "SQL databases without geo-replication"
    pillar: reliability
    caf_area: management
    alz_area: logging
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ 'microsoft.sql/servers/databases'
      | where name !~ 'master'
      | extend databaseId = tolower(id)
      | project id, name, resourceGroup, subscriptionId, location, databaseId
      | join kind=leftouter (
          resources
          | where type =~ 'microsoft.sql/servers/failovergroups'
          | mv-expand failoverDatabaseId = properties.databases
          | extend failoverDatabaseId = tolower(tostring(failoverDatabaseId))
          | summarize by failoverDatabaseId
        ) on $left.databaseId == $right.failoverDatabaseId
      | where isempty(failoverDatabaseId)
      | project id, name, resourceGroup, subscriptionId, location
    match: any
    recommendation: "Use failover groups or active geo-replication for mission-critical Azure SQL databases."
    remediation_steps:
      - "Create a secondary SQL server in a paired or alternate region"
      - "Configure a failover group and test planned failover behavior"
    references:
      - "https://learn.microsoft.com/azure/azure-sql/database/failover-group-sql-db?view=azuresql"
    mappings:
      waf_pillar: [reliability]
      caf_lifecycle: [ready, adopt]
      resource_type: "Microsoft.Sql/servers/databases"

  - id: REL-005
    title: "App Services not using zone redundancy"
    pillar: reliability
    caf_area: management
    alz_area: logging
    severity: medium
    confidence: medium
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ 'microsoft.web/serverfarms'
      | extend skuTier = tostring(sku.tier)
      | extend zoneRedundant = tobool(properties.zoneRedundant)
      | where tolower(skuTier) contains 'premium' or tolower(skuTier) contains 'isolated'
      | where zoneRedundant == false
      | project id, name, resourceGroup, subscriptionId, location, sku=skuTier
    match: any
    recommendation: "Enable zone redundancy for supported App Service plans hosting production workloads."
    remediation_steps:
      - "Review App Service plan SKU and regional support for zone redundancy"
      - "Enable zone redundancy on eligible Premium or Isolated plans"
    references:
      - "https://learn.microsoft.com/azure/app-service/configure-zone-redundancy"
    mappings:
      waf_pillar: [reliability]
      caf_lifecycle: [ready, adopt]
      resource_type: "Microsoft.Web/serverFarms"

