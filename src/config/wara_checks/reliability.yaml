  - id: REL-018
    title: "Front Door without health probes"
    pillar: reliability
    caf_area: network
    alz_area: networking
    severity: medium
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ 'microsoft.cdn/profiles'
      | where sku.name in~ ('Standard_AzureFrontDoor', 'Premium_AzureFrontDoor')
      | extend profileId = tolower(id)
      | project id, name, resourceGroup, subscriptionId, location, sku=tostring(sku.name), profileId
      | join kind=leftouter (
          cdnresources
          | where type =~ 'microsoft.cdn/profiles/origingroups'
          | extend profileId = tolower(strcat_array(array_slice(split(id, '/'), 0, 8), '/'))
          | extend hasHealthProbe = isnotempty(tostring(properties.healthProbeSettings))
          | summarize originGroupCount = count(), healthProbeCount = countif(hasHealthProbe) by profileId
        ) on profileId
      | where toint(coalesce(originGroupCount, 0)) == 0 or toint(coalesce(healthProbeCount, 0)) == 0
      | project id, name, resourceGroup, subscriptionId, location, sku, originGroupCount=toint(coalesce(originGroupCount, 0)), healthProbeCount=toint(coalesce(healthProbeCount, 0))
    match: any
    recommendation: "Configure health probes for Azure Front Door origin groups so traffic can fail away from unhealthy backends."
    remediation_steps:
      - "Create or update origin groups with health probe settings"
      - "Validate probe path responses and failover behavior during testing"
    references:
      - "https://learn.microsoft.com/azure/frontdoor/health-probes"
    mappings:
      waf_pillar: [reliability]
      caf_lifecycle: [ready, adopt]
      resource_type: "Microsoft.Cdn/profiles"

  - id: REL-019
    title: "Container Registries without geo-replication"
    pillar: reliability
    caf_area: management
    alz_area: logging
    severity: medium
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ 'microsoft.containerregistry/registries'
      | where sku.name =~ 'Premium'
      | extend registryId = tolower(id)
      | project id, name, resourceGroup, subscriptionId, location, registryId
      | join kind=leftouter (
          resources
          | where type =~ 'microsoft.containerregistry/registries/replications'
          | extend registryId = tolower(strcat_array(array_slice(split(id, '/'), 0, -3), '/'))
          | summarize replicationCount = count() by registryId
        ) on registryId
      | where toint(coalesce(replicationCount, 0)) == 0
      | project id, name, resourceGroup, subscriptionId, location, replicationCount=toint(coalesce(replicationCount, 0))
    match: any
    recommendation: "Use geo-replication on Premium Azure Container Registry instances that serve multi-region applications."
    remediation_steps:
      - "Add at least one registry replication in a secondary region"
      - "Update deployment pipelines to pull from the nearest replica when possible"
    references:
      - "https://learn.microsoft.com/azure/container-registry/container-registry-best-practices#geo-replicate-multi-region-deployments"
    mappings:
      waf_pillar: [reliability]
      caf_lifecycle: [ready, adopt]
      resource_type: "Microsoft.ContainerRegistry/registries"

