  # --- WAF Security Checklist: Defender & Monitoring ---

  - id: SEC-010
    title: "Defender for Cloud enabled on subscriptions"
    pillar: security
    caf_area: security
    alz_area: security
    severity: critical
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      securityresources
      | where type == "microsoft.security/pricings"
      | where properties.pricingTier != "Standard"
      | project id, name, subscriptionId, tier=properties.pricingTier
    match: any
    recommendation: "Enable Defender for Cloud Standard tier on all subscriptions."
    remediation_steps:
      - "Enable via: az security pricing create --name default --tier Standard"
    references:
      - "https://learn.microsoft.com/azure/defender-for-cloud/enable-enhanced-security"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

  - id: SEC-011
    title: "Defender plans active for key resource types"
    pillar: security
    caf_area: security
    alz_area: security
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      securityresources
      | where type == "microsoft.security/pricings"
      | where name in~ ("VirtualMachines", "SqlServers", "StorageAccounts", "KeyVaults", "Arm")
      | where properties.pricingTier != "Standard"
      | project id, name, subscriptionId, tier=properties.pricingTier
    match: any
    recommendation: "Enable Defender plans for VMs, SQL, Storage, Key Vault, and ARM."
    remediation_steps:
      - "Enable each plan: az security pricing create --name {plan} --tier Standard"
    references:
      - "https://learn.microsoft.com/azure/defender-for-cloud/defender-for-cloud-introduction"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

  - id: SEC-012
    title: "NSGs applied to all subnets"
    pillar: security
    caf_area: network
    alz_area: networking
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ "microsoft.network/virtualnetworks"
      | mv-expand subnet = properties.subnets
      | where subnet.name !in~ ("GatewaySubnet", "AzureFirewallSubnet", "AzureFirewallManagementSubnet", "AzureBastionSubnet", "RouteServerSubnet")
      | where isnull(subnet.properties.networkSecurityGroup)
      | project id, vnetName=name, subnetName=tostring(subnet.name), resourceGroup, subscriptionId
    match: any
    recommendation: "Attach an NSG to every subnet (except gateway/firewall/bastion subnets)."
    remediation_steps:
      - "Create and associate NSG: az network vnet subnet update --nsg {nsg-name}"
    references:
      - "https://learn.microsoft.com/azure/virtual-network/network-security-groups-overview"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

  - id: SEC-013
    title: "Private endpoints used for PaaS services"
    pillar: security
    caf_area: network
    alz_area: networking
    severity: high
    confidence: medium
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type in~ (
          "microsoft.storage/storageaccounts",
          "microsoft.keyvault/vaults",
          "microsoft.sql/servers",
          "microsoft.cognitiveservices/accounts"
        )
      | where properties.publicNetworkAccess =~ "Enabled" or isnull(properties.publicNetworkAccess)
      | where array_length(properties.privateEndpointConnections) == 0
            or isnull(properties.privateEndpointConnections)
      | project id, name, type, resourceGroup, subscriptionId
    match: any
    recommendation: "Use private endpoints for PaaS services to eliminate public network exposure."
    remediation_steps:
      - "Create private endpoint and disable public access on the resource"
    references:
      - "https://learn.microsoft.com/azure/private-link/private-endpoint-overview"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

  - id: SEC-014
    title: "DDoS Protection Plan on hub VNet"
    pillar: security
    caf_area: network
    alz_area: networking
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ "microsoft.network/virtualnetworks"
      | where tags["alz_role"] =~ "hub" or name contains "hub"
      | where isnull(properties.ddosProtectionPlan) or properties.enableDdosProtection != true
      | project id, name, resourceGroup, subscriptionId
    match: any
    recommendation: "Enable DDoS Network Protection on hub virtual networks."
    remediation_steps:
      - "Create DDoS protection plan and associate with hub VNet"
