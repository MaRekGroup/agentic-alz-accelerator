    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

  - id: SEC-016
    title: "Disk encryption on all VMs"
    pillar: security
    caf_area: security
    alz_area: security
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ "microsoft.compute/disks"
      | where properties.encryption.type !in~ ("EncryptionAtRestWithPlatformKey", "EncryptionAtRestWithCustomerKey", "EncryptionAtRestWithPlatformAndCustomerKeys")
            and properties.encryptionSettingsCollection.enabled != true
      | project id, name, diskState=properties.diskState, resourceGroup, subscriptionId
    match: any
    recommendation: "Ensure all managed disks have encryption enabled (platform or customer-managed key)."
    remediation_steps:
      - "Enable Azure Disk Encryption or use encryption at host"
    references:
      - "https://learn.microsoft.com/azure/virtual-machines/disk-encryption-overview"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

  - id: SEC-017
    title: "SQL TDE enabled on all databases"
    pillar: security
    caf_area: security
    alz_area: security
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ "microsoft.sql/servers/databases"
      | where name != "master"
      | where properties.transparentDataEncryption[0].status !~ "Enabled"
            and isnull(properties.transparentDataEncryption)
      | project id, name, resourceGroup, subscriptionId
    match: any
    recommendation: "Enable Transparent Data Encryption (TDE) on all SQL databases."
    remediation_steps:
      - "Enable TDE: az sql db tde set --status Enabled"
    references:
      - "https://learn.microsoft.com/azure/azure-sql/database/transparent-data-encryption-tde-overview"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

  - id: SEC-018
    title: "Diagnostic settings on security-critical resources"
    pillar: security
    caf_area: management
    alz_area: logging
    severity: medium
    confidence: medium
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type in~ (
          "microsoft.keyvault/vaults",
          "microsoft.network/networksecuritygroups",
          "microsoft.network/azurefirewalls"
        )
      | join kind=leftouter (
          resources
          | where type =~ "microsoft.insights/diagnosticsettings"
          | extend targetId = tostring(properties.resourceId)
          | project targetId
        ) on $left.id == $right.targetId
      | where isempty(targetId)
      | project id, name, type, resourceGroup, subscriptionId
    match: any
    recommendation: "Configure diagnostic settings on Key Vaults, NSGs, and Firewalls to ship logs to Log Analytics."
    remediation_steps:
      - "Create diagnostic setting: az monitor diagnostic-settings create --resource {id} --workspace {law-id}"
    references:
      - "https://learn.microsoft.com/azure/azure-monitor/essentials/diagnostic-settings"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

  - id: SEC-019
    title: "No open management ports from internet"
    pillar: security
    caf_area: network
    alz_area: networking
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ "microsoft.network/networksecuritygroups"
      | mv-expand rule = properties.securityRules
      | where rule.properties.direction =~ "Inbound"
      | where rule.properties.access =~ "Allow"
      | where rule.properties.sourceAddressPrefix in~ ("*", "Internet", "0.0.0.0/0")
      | where rule.properties.destinationPortRange in~ ("22", "3389", "22-22", "3389-3389")
            or rule.properties.destinationPortRange == "*"
      | project id, nsgName=name, ruleName=tostring(rule.name), port=tostring(rule.properties.destinationPortRange), resourceGroup, subscriptionId
    match: any
    recommendation: "Remove NSG rules that allow RDP (3389) or SSH (22) from the internet. Use Azure Bastion or JIT access."
    remediation_steps:
      - "Delete or restrict the inbound rule source to specific IPs"
      - "Enable JIT VM access via Defender for Cloud"
    references:
      - "https://learn.microsoft.com/azure/defender-for-cloud/just-in-time-access-usage"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

  - id: SEC-020
    title: "JIT VM access enabled for management"
    pillar: security
    caf_area: security
    alz_area: security
    severity: medium
    confidence: medium
    scope: subscription
    query_type: resource_graph
    query: |
      securityresources
      | where type =~ "microsoft.security/jitnetworkaccesspolicies"
      | summarize jitCount = count()
      | where jitCount == 0
    match: any
    recommendation: "Enable Just-In-Time VM access to reduce attack surface for management ports."
    remediation_steps:
      - "Configure JIT access in Defender for Cloud for VMs requiring management access"
    references:
      - "https://learn.microsoft.com/azure/defender-for-cloud/just-in-time-access-overview"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

  - id: SEC-021
    title: "No classic/legacy resources deployed"
    pillar: security
    caf_area: security
    alz_area: security
    severity: critical
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type startswith "microsoft.classic"
            or type =~ "microsoft.compute/virtualmachines" and kind =~ "classic"
      | project id, name, type, resourceGroup, subscriptionId
    match: any
    recommendation: "Migrate all classic/legacy resources to ARM — classic resources lack modern security controls."
    remediation_steps:
      - "Migrate classic VMs, storage, and networking to ARM equivalents"
    references:
      - "https://learn.microsoft.com/azure/virtual-machines/classic-vm-deprecation"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

  - id: SEC-022
    title: "Key Vault secrets/certificates expiring within 30 days"
    pillar: security
    caf_area: security
    alz_area: security
    severity: medium
    confidence: medium
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ "microsoft.keyvault/vaults/secrets"
            or type =~ "microsoft.keyvault/vaults/certificates"
      | where properties.attributes.expires != ""
      | extend expiryDate = todatetime(properties.attributes.expires)
      | where expiryDate <= now() + 30d
      | project id, name, type, expiryDate, resourceGroup, subscriptionId
    match: any
    recommendation: "Rotate or renew secrets and certificates expiring within 30 days."
    remediation_steps:
      - "Renew the certificate or rotate the secret before expiry"
      - "Configure auto-rotation policies where supported"
    references:
      - "https://learn.microsoft.com/azure/key-vault/certificates/overview-renew-certificate"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

