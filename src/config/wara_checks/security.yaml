      caf_lifecycle: [govern, manage]

  - id: SEC-027
    title: "Backup vault soft delete and immutability enabled"
    pillar: security
    caf_area: management
    alz_area: logging
    severity: high
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ "microsoft.recoveryservices/vaults"
      | where properties.securitySettings.softDeleteSettings.softDeleteState !~ "Enabled"
            or properties.securitySettings.immutabilitySettings.state !~ "Locked"
      | project id, name, resourceGroup, subscriptionId,
                softDelete=properties.securitySettings.softDeleteSettings.softDeleteState,
                immutability=properties.securitySettings.immutabilitySettings.state
    match: any
    recommendation: "Enable soft delete and immutability on Recovery Services vaults to prevent ransomware deletion of backups."
    remediation_steps:
      - "Enable soft delete and set immutability to Locked on backup vaults"
    references:
      - "https://learn.microsoft.com/azure/backup/backup-azure-security-feature-cloud"
    mappings:
      waf_pillar: [security, reliability]
      caf_lifecycle: [govern, manage]

  - id: SEC-028
    title: "VMs with pending critical security patches"
    pillar: security
    caf_area: management
    alz_area: logging
    severity: medium
    confidence: medium
    scope: subscription
    query_type: resource_graph
    query: |
      patchassessmentresources
      | where type =~ "microsoft.compute/virtualmachines/patchassessmentresults/latest"
      | where properties.criticalAndSecurityPatchCount > 0
      | project id, vmName=tostring(split(id, "/")[8]),
                criticalPatches=properties.criticalAndSecurityPatchCount,
                subscriptionId
    match: any
    recommendation: "Apply pending critical security patches to VMs using Azure Update Manager."
    remediation_steps:
      - "Schedule patching via Azure Update Manager or apply immediately"
    references:
