  - id: SEC-030
    title: "Network Watcher enabled in active regions"
    pillar: security
    caf_area: network
    alz_area: networking
    severity: medium
    confidence: high
    scope: subscription
    query_type: resource_graph
    query: |
      resources
      | where type =~ "microsoft.network/virtualnetworks"
      | distinct location
      | join kind=leftouter (
          resources
          | where type =~ "microsoft.network/networkwatchers"
          | project watcherLocation=location
        ) on $left.location == $right.watcherLocation
      | where isnull(watcherLocation)
      | project missingRegion=location
    match: any
    recommendation: "Enable Network Watcher in all regions where you have deployed virtual networks."
    remediation_steps:
      - "Create Network Watcher: az network watcher configure --locations {region} --enabled true"
    references:
      - "https://learn.microsoft.com/azure/network-watcher/network-watcher-overview"
    mappings:
      waf_pillar: [security]
      caf_lifecycle: [govern, manage]

