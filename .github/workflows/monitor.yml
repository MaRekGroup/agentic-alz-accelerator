  # =========================================================================
  # Summary
  # =========================================================================
  summary:
    name: "Compliance Summary"
    needs: [scan-management, scan-connectivity, scan-identity, scan-security]
    if: always()
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - name: Compliance Report
        run: |
          echo "## 🔭 Landing Zone Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| LZ | Resources | Compliance | Violations |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Management | ${{ needs.scan-management.outputs.total_resources }} | ${{ needs.scan-management.outputs.compliance_pct }}% | ${{ needs.scan-management.outputs.violations }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Connectivity | ${{ needs.scan-connectivity.outputs.total_resources }} | ${{ needs.scan-connectivity.outputs.compliance_pct }}% | ${{ needs.scan-connectivity.outputs.violations }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Identity | ${{ needs.scan-identity.outputs.total_resources }} | ${{ needs.scan-identity.outputs.compliance_pct }}% | ${{ needs.scan-identity.outputs.violations }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.scan-security.outputs.total_resources }} | ${{ needs.scan-security.outputs.compliance_pct }}% | ${{ needs.scan-security.outputs.violations }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scan completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
