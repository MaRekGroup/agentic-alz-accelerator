# ============================================================================
# Landing Zone Monitoring — Compliance Scan Across All Deployed Subscriptions
# Scans Management, Connectivity, Identity, Security subscriptions for
# policy compliance using Azure Policy Insights SDK.
# ============================================================================
name: "Monitor · Compliance Scan"

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of scan to run'
        required: true
        type: choice
        options:
          - compliance
          - drift
          - full
      scan_scope:
        description: 'Which subscriptions to scan'
        required: true
        type: choice
        options:
          - all
          - management
          - connectivity
          - identity
          - security

permissions:
  id-token: write
  contents: read

jobs:
  # =========================================================================
  # Scan each deployed platform subscription
  # =========================================================================
  scan-management:
    name: "Scan · Management"
    if: >-
      github.event.inputs.scan_scope == 'all' ||
      github.event.inputs.scan_scope == 'management' ||
      github.event_name == 'schedule'
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    outputs:
      compliance_pct: ${{ steps.scan.outputs.compliance_pct }}
      violations: ${{ steps.scan.outputs.violations }}
      total_resources: ${{ steps.scan.outputs.total_resources }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_MGMT_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Compliance Scan
        id: scan
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.PLATFORM_MGMT_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SCAN_TYPE: ${{ inputs.scan_type || 'compliance' }}
        run: |
          python -c "
          import asyncio, json, os, sys

          async def main():
              from azure.identity import DefaultAzureCredential
              from azure.mgmt.policyinsights import PolicyInsightsClient
              from azure.mgmt.policyinsights.models import QueryOptions

              sub_id = os.environ['AZURE_SUBSCRIPTION_ID']
              credential = DefaultAzureCredential()
              client = PolicyInsightsClient(credential, sub_id)

              try:
                  summary = client.policy_states.summarize_for_subscription(
                      subscription_id=sub_id,
                      policy_states_summary_resource='latest',
                  )
                  results = summary.value[0] if summary.value else None
                  if not results:
                      print('No policy data found')
                      total, non_compliant = 0, 0
                  else:
                      sr = results.results
                      if hasattr(sr, 'total_resources'):
                          total = sr.total_resources or 0
                          non_compliant = sr.non_compliant_resources or 0
                      elif hasattr(sr, 'resource_details'):
                          total = sum(d.count or 0 for d in (sr.resource_details or []))
                          non_compliant = sum(
                              d.count or 0 for d in (sr.resource_details or [])
                              if d.compliance_state == 'noncompliant'
                          )
                      else:
                          total = getattr(sr, 'query_results_count', 0) or 0
                          non_compliant = getattr(sr, 'non_compliant_resources', 0) or 0

                  compliant = total - non_compliant
                  pct = (compliant / total * 100) if total > 0 else 100.0

                  # Get violations detail
                  violations = []
                  try:
                      qo = QueryOptions(filter=\"complianceState eq 'NonCompliant'\", top=20)
                      states = client.policy_states.list_query_results_for_subscription(
                          subscription_id=sub_id,
                          policy_states_resource='latest',
                          query_options=qo,
                      )
                      for s in states:
                          violations.append({
                              'resource_id': getattr(s, 'resource_id', 'unknown'),
                              'policy': getattr(s, 'policy_definition_name', 'unknown'),
                              'policy_action': getattr(s, 'policy_definition_action', 'unknown'),
                          })
                  except Exception as ve:
                      print(f'::warning::Could not list violations: {ve}')

                  report = {
                      'subscription': sub_id[:8] + '...',
                      'lz': 'management',
                      'total_resources': total,
                      'compliant': compliant,
                      'non_compliant': non_compliant,
                      'compliance_pct': round(pct, 1),
                      'violations': violations,
                  }
                  print(json.dumps(report, indent=2, default=str))

                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f'compliance_pct={pct:.1f}\n')
                      f.write(f'violations={len(violations)}\n')
                      f.write(f'total_resources={total}\n')

                  with open('compliance-management.json', 'w') as f:
                      json.dump(report, f, indent=2, default=str)

              except Exception as e:
                  print(f'::warning::Compliance scan failed: {e}')
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write('compliance_pct=0\n')
                      f.write('violations=-1\n')
                      f.write('total_resources=0\n')

          asyncio.run(main())
          "

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-management
          path: compliance-management.json

