name: Generate Architecture Diagrams

on:
  workflow_dispatch:
    inputs:
      mg_prefix:
        description: Management group prefix
        required: false
        default: alz
        type: string
      customer:
        description: 'Customer name for output directory'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    name: Generate ALZ Diagrams
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install Python dependencies
        run: pip install diagrams typer

      - name: Generate diagrams
        run: |
          set -euo pipefail
          DIAG_DIR="agent-output/${{ inputs.customer }}/diagrams"
          shopt -s nullglob
          specs=("$DIAG_DIR"/03-design-*.json)
          if [ ${#specs[@]} -gt 0 ]; then
            echo "Rendering ${#specs[@]} zone-based spec(s) with render_alz_diagram.py"
            python scripts/diagrams/render_alz_diagram.py "${specs[@]}"
          else
            echo "No 03-design-*.json specs found; falling back to the generic generator"
            python -c "
          from src.tools.python_diagram_generator import generate_all_diagrams
          paths = generate_all_diagrams(
              output_dir='$DIAG_DIR',
              mg_prefix='${{ inputs.mg_prefix }}',
          )
          for p in paths:
              print(f'Generated: {p}')
          "
          fi

      - name: Commit updated diagrams
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agent-output/${{ inputs.customer }}/diagrams/*.png
          git add agent-output/${{ inputs.customer }}/diagrams/*.drawio 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No diagram changes to commit."
          else
            git commit -m "docs(diagrams): regenerate architecture diagrams [skip ci]"
            git push
          fi
