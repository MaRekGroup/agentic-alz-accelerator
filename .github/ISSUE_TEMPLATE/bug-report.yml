name: 🐛 Bug Report
description: Report a bug in the ALZ Accelerator
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug! Please fill in the details below."

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Clear description of the bug"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: "Which component is affected?"
      options:
        - Agent (orchestrator, requirements, governance, etc.)
        - Infrastructure (Bicep modules)
        - Infrastructure (Terraform modules)
        - MCP Server (azure-pricing, azure-platform, drawio)
        - Validator (security-baseline, cost-governance)
        - Pipeline (GitHub Actions, Azure DevOps)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Step-by-step instructions to reproduce the bug"
      placeholder: |
        1. Run `@orchestrator` with ...
        2. At Step 3, the agent ...
        3. Expected: ...
        4. Actual: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, VS Code version, Copilot extension version, etc."
      placeholder: |
        - OS: macOS / Windows / Linux
        - VS Code: 1.x.x
        - Copilot Chat: x.x.x
